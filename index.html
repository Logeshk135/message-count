<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Counter</title>
</head>

<body>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* Background Image */
    background-image:url("background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* Transparent Glass Box */
.container{
    width:420px;
    padding:30px;
    border-radius:15px;

    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;
}

h2{
    margin-bottom:10px;
    color:#fff;
}

p{
    color:#f1f1f1;
    margin-bottom:15px;
    font-size:14px;
}

textarea{
    width:100%;
    height:130px;
    padding:12px;
    font-size:15px;
    border-radius:8px;
    border:none;
    outline:none;
    resize:none;
    background:rgba(255,255,255,0.7);
}

textarea:focus{
    background:rgba(255,255,255,0.95);
}

#counter{
    margin-top:12px;
    font-weight:600;
    color:#fff;
}

#warning{
    margin-top:6px;
    font-size:13px;
    color:#ff4d4d;
}
</style>
<div class="container">
    <h2>Message Box</h2>
    <p>200 characters max</p>

    <textarea id="message" placeholder="Type your message..."></textarea>

    <div id="counter">0 / 200 characters</div>
    <div id="warning"></div>
</div>

<script src="script.js"></script>

</body>
</html>
